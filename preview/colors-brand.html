<!doctype html>
<html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .swatch { border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-md); }
  .chip   { height: 100px; display: flex; align-items: flex-end; padding: 12px; color: #FAF8F5; font-family: var(--font-en); font-weight: 600; font-size: 14px; }
  .meta   { padding: 10px 12px; background: var(--surface); display: flex; justify-content: space-between; font-family: var(--font-en); font-size: 12px; color: var(--fg-2); font-weight: 500; }
  .meta b { color: var(--fg); font-weight: 600; }
  .mono { font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#2D5F3F">Olive</div>
      <div class="meta"><b>Primary</b><span class="mono">#2D5F3F</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#C76F3F">Terracotta</div>
      <div class="meta"><b>Secondary</b><span class="mono">#C76F3F</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#D4A24C; color:#1A1A1A">Gold</div>
      <div class="meta"><b>Accent</b><span class="mono">#D4A24C</span></div>
    </div>
  </div>
</body></html>
