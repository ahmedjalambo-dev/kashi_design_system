<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-en); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .badge svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <span class="badge badge-success">
    <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
    Sent
  </span>
  <span class="badge badge-info">
    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
    Verified
  </span>
  <span class="badge badge-warning">
    <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12" y2="20"/></svg>
    Offline
  </span>
  <span class="badge badge-error">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    Failed
  </span>
  <span class="badge badge-info">
    <svg viewBox="0 0 24 24"><path d="m14.5 9.5 4.5-1-1-4.5"/><path d="M19 8.5C16.5 5 12.5 3 9 5.5"/></svg>
    Signed
  </span>
</body></html>
