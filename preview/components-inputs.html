<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-en); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--fg-2); margin-bottom: 6px; }
  .with-prefix { position: relative; }
  .with-prefix .pre { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-family: var(--font-mono); color: var(--fg-2); font-size: 14px; }
  .with-prefix input { padding-left: 50px; }
  .input-error { border-color: var(--color-error) !important; box-shadow: 0 0 0 3px var(--color-error-bg) !important; }
  .err { font-size: 12px; color: var(--color-error); margin-top: 6px; display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>
  <div class="field">
    <label>Phone number</label>
    <div class="with-prefix">
      <span class="pre">+970</span>
      <input class="input" placeholder="59 123 4567">
    </div>
  </div>
  <div class="field">
    <label>Amount</label>
    <div class="with-prefix">
      <span class="pre">₪</span>
      <input class="input num" value="250.00">
    </div>
  </div>
  <div class="field">
    <label>Recipient name</label>
    <input class="input" placeholder="Mohammed Al-Najjar">
  </div>
  <div class="field">
    <label>Verification code</label>
    <input class="input input-error" value="12 34">
    <div class="err">⚠ Code expired. Request a new one.</div>
  </div>
</body></html>
