<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-en); color: var(--fg); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box  { width: 84px; height: 64px; background: var(--kashi-olive-50); border: 1px solid var(--kashi-olive-300); }
  .name { font-size: 12px; font-weight: 600; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">Input</div><div class="meta">12px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">Card</div><div class="meta">16px</div></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><div class="name">Button</div><div class="meta">24px</div></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><div class="name">Balance</div><div class="meta">24px</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:64px"></div><div class="name">Pill</div><div class="meta">999px</div></div>
  </div>
</body></html>
