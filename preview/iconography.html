<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-en); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 4px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
  .ic svg { width: 24px; height: 24px; stroke: var(--kashi-olive); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .lbl { font-size: 10px; color: var(--fg-2); font-family: var(--font-mono); }
</style>
</head>
