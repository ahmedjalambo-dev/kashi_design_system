<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-en); display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
</style>
</head>
<body>
  <button class="btn btn-primary">Send money</button>
  <button class="btn btn-secondary">Cancel</button>
  <button class="btn btn-accent">Pay offline</button>
  <button class="btn btn-ghost">View details</button>
  <button class="btn btn-primary" disabled style="opacity:0.4;cursor:not-allowed">Disabled</button>
</body></html>
