<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-en); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw { border-radius: 12px; padding: 12px 10px; min-height: 90px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; border: 1px solid var(--border); }
  .name { font-family: var(--font-en); font-size: 12px; font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#FAF8F5;color:#1A1A1A"><span class="name">Background</span><span>#FAF8F5</span></div>
    <div class="sw" style="background:#FFFFFF;color:#1A1A1A"><span class="name">Surface</span><span>#FFFFFF</span></div>
    <div class="sw" style="background:#F4F1EB;color:#1A1A1A"><span class="name">Surface-2</span><span>#F4F1EB</span></div>
    <div class="sw" style="background:#E8E5E0;color:#1A1A1A"><span class="name">Border</span><span>#E8E5E0</span></div>
    <div class="sw" style="background:#6B6B6B;color:#fff"><span class="name">Text-2</span><span>#6B6B6B</span></div>
    <div class="sw" style="background:#1A1A1A;color:#fff"><span class="name">Text-1</span><span>#1A1A1A</span></div>
  </div>
</body></html>
