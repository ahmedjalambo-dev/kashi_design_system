<!doctype html>
<html><head><meta charset="utf-8"><title>Dark mode</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #0F1612; font-family: var(--font-en); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: 12px; padding: 14px 12px; min-height: 90px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; }
  .name { font-family: var(--font-en); font-size: 12px; font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#0F1612;color:#F5F2EC;border:1px solid #2C3A33"><span class="name">Background</span><span>#0F1612</span></div>
    <div class="sw" style="background:#1A2620;color:#F5F2EC"><span class="name">Surface</span><span>#1A2620</span></div>
    <div class="sw" style="background:#243029;color:#F5F2EC"><span class="name">Surface-2</span><span>#243029</span></div>
    <div class="sw" style="background:#4A8A65;color:#0F1612"><span class="name">Olive (lifted)</span><span>#4A8A65</span></div>
    <div class="sw" style="background:#F5F2EC;color:#0F1612"><span class="name">Text</span><span>#F5F2EC</span></div>
  </div>
</body></html>
