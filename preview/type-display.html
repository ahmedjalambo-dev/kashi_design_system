<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; font-family: var(--font-en); }
  .row { display: flex; align-items: baseline; gap: 24px; justify-content: space-between; }
  .en { font-size: 48px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; color: var(--fg); font-feature-settings: "tnum" 1; }
  .ar { font-family: var(--font-ar); font-size: 50px; font-weight: 700; line-height: 1.1; color: var(--kashi-olive); }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); margin-top: 14px; }
</style>
</head>
<body>
  <div class="row">
    <div>
      <div class="en">₪ 1,250.00</div>
      <div class="meta">Display · Inter 700 · 48 / 53</div>
    </div>
    <div>
      <div class="ar">١٢٥٠٫٠٠ ₪</div>
      <div class="meta">Display · IBM Plex Arabic 700 · 50 / 55</div>
    </div>
  </div>
</body></html>
